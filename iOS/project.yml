name: Recletter
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Recletter:
    type: application
    platform: iOS
    sources:
      - path: Recletter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recletter
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Recletter
    info:
      path: Recletter/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
  RecletterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RecletterTests
    dependencies:
      - target: Recletter
  RecletterUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RecletterUITests
    dependencies:
      - target: Recletter
schemes:
  Recletter:
    build:
      targets:
        Recletter: all
    test:
      targets:
        - RecletterTests
        - RecletterUITests
